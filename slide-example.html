<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Slide</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Nunito', sans-serif;
        background: linear-gradient(135deg, #3b3171 0%, #4b3e8c 60%, #f16943 100%);
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        text-align: center;
        padding: 40px;
      }
      .logo-wrap { margin-bottom: 32px; }
      .logo-wrap img { height: 80px; filter: brightness(0) invert(1); }
      h1 { font-size: clamp(48px, 8vw, 120px); font-weight: 900; line-height: 1; margin-bottom: 24px; }
      p  { font-size: clamp(24px, 3.5vw, 48px); font-weight: 700; opacity: 0.85; }
      .tag {
        margin-top: 40px;
        background: rgba(255,255,255,0.15);
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 999px;
        padding: 12px 28px;
        font-size: clamp(16px, 2vw, 28px);
        font-weight: 800;
        letter-spacing: 0.06em;
      }
    </style>
  </head>
  <body>
    <div class="logo-wrap">
      <img src="./assets/img/repaircafexneworig.png" alt="Repair Café Zuilen" />
    </div>
    <h1>Repair Café Zuilen</h1>
    <p>Wij repareren wat kapot is.</p>
    <div class="tag">Welkom!</div>
  </body>
</html>
